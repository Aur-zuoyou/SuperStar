作业: 
开始:
    runs-on: ubuntu-latest # 在最新版本的 Ubuntu 操作系统环境下运行
步骤: # 要执行的步骤
      - name: 拷贝代码
        uses: actions/checkout@v4  # 用于将github代码仓库的代码拷贝到工作目录中
 
      - name: 设置python环境
: actions/setup-python@v5# 用于设置 Python 环境，它允许你指定要在工作环境中使用的 Python 版本
        with:
          python-version: '3.10'  # 选择要用的Python版本
 
      - name: 安装依赖包
运行: | # 安装依赖包
          pip install -r ./requirements.txt 
          
      
      - 名称: 运行 main.py
